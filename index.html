<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generator IPET · WOPFU · Karta Dostosowań</title>

  <!-- OCR (Tesseract.js – offline) -->
<script src="https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap');
    :root{--navy:#0f1f3d;--navy2:#1a2f54;--teal:#0d9488;--bg:#f0f4f8;--gray:#64748b;--border:#e2e8f0;--r:12px;--sh:0 6px 28px rgba(15,31,61,.12)}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Sora',sans-serif;background:var(--bg);color:var(--navy)}
    header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:18px}
    main{max-width:1200px;margin:0 auto;padding:26px 18px 80px}

    .steps{display:flex;gap:6px;background:#fff;border-radius:var(--r);padding:6px;box-shadow:var(--sh);margin-bottom:22px}
    .step{flex:1;display:flex;gap:8px;align-items:center;padding:10px 12px;border-radius:8px;font-size:.78rem;font-weight:700;color:#94a3b8;cursor:pointer}
    .step.active{background:var(--navy);color:#fff}
    .step.done{color:var(--teal)}
    .step.disabled{opacity:.35;pointer-events:none}
    .num{width:22px;height:22px;border-radius:50%;background:currentColor;color:#fff;display:grid;place-items:center;font-size:.7rem}

    .card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:22px;margin-bottom:18px}
    h3{margin-top:0}

    label{font-size:.7rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em}
    input,textarea{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:8px;font-family:'Sora',sans-serif;font-size:.82rem}
    textarea{min-height:90px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    @media(max-width:800px){.grid3{grid-template-columns:1fr}}

    .btn{margin-top:12px;padding:10px 18px;border-radius:8px;border:none;font-weight:700;cursor:pointer}
    .primary{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff}

    /* Dostosowania */
    .group{margin-bottom:18px}
    .group-title{font-weight:700;color:var(--teal);margin-bottom:8px}
    .item{display:flex;gap:8px;align-items:flex-start;font-size:.82rem;margin-bottom:6px}

    /* Podpisy */
    .signatures{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-top:28px}
    .sig-line{margin-top:34px;border-bottom:1px dotted #555;height:24px}
    .sig-label{margin-top:6px;color:#666;font-size:.75rem}

    @media print{.steps,.btn{display:none} body{background:#fff}}
  </style>
</head>
<body>
<header>
  <h2>📋 Generator IPET · WOPFU · Karta Dostosowań (MEN)</h2>
</header>

<main>

<div class="steps">
  <div class="step active" id="st1" onclick="go(1)"><div class="num">1</div>Dokument</div>
  <div class="step" id="st2" onclick="go(2)"><div class="num">2</div>Dane</div>
  <div class="step" id="st3" onclick="go(3)"><div class="num">3</div>WOPFU</div>
  <div class="step" id="st4" onclick="go(4)"><div class="num">4</div>IPET</div>
  <div class="step" id="st5" onclick="go(5)"><div class="num">5</div>Dostosowania</div>
  <div class="step" id="st6" onclick="go(6)"><div class="num">6</div>Druk</div>
</div>

<section id="s1" class="card">
  <h3>1. Dokument (OCR)</h3>
  <input type="file" id="fileInput" accept="image/*,.pdf" />
  <button class="btn primary" onclick="runOCR()">🔍 OCR</button>
  <textarea id="ocrText" placeholder="Tekst z OCR"></textarea>
</section>

<section id="s2" class="card" style="display:none">
  <h3>2. Dane ucznia</h3>
  <div class="grid3">
    <div><label>Imię i nazwisko</label><input id="f_name"></div>
    <div><label>PESEL</label><input id="f_pesel"></div>
    <div><label>Klasa</label><input id="f_class"></div>
  </div>
</section>

<section id="s3" class="card" style="display:none">
  <h3>3. WOPFU</h3>
  <textarea placeholder="WOPFU – tylko dla orzeczeń"></textarea>
</section>

<section id="s4" class="card" style="display:none">
  <h3>4. IPET</h3>
  <textarea placeholder="IPET – tylko dla orzeczeń"></textarea>
</section>

<section id="s5" class="card" style="display:none">
  <h3>5. Karta Dostosowań</h3>

  <div class="group">
    <div class="group-title">Organizacja pracy</div>
    <label class="item"><input type="checkbox" value="Wydłużenie czasu pracy">Wydłużenie czasu pracy</label>
    <label class="item"><input type="checkbox" value="Jasne polecenia">Jasne polecenia</label>
  </div>

  <div class="group">
    <div class="group-title">Metody</div>
    <label class="item"><input type="checkbox" value="Preferowanie odpowiedzi ustnych">Preferowanie odpowiedzi ustnych</label>
  </div>
</section>

<section id="s6" class="card" style="display:none">
  <h3>6. Druk i podpisy</h3>
  <div class="signatures">
    <div><div class="sig-line"></div><div class="sig-label">Wychowawca / nauczyciel</div></div>
    <div><div class="sig-line"></div><div class="sig-label">Dyrektor szkoły</div></div>
    <div><div class="sig-line"></div><div class="sig-label">Rodzic / opiekun</div></div>
  </div>
</section>

</main>

<script>
let cur=1; let DOC_TYPE='opinia';
function go(n){
  document.querySelectorAll('section[id^="s"]').forEach(s=>s.style.display='none');
  document.getElementById('s'+n).style.display='block';
  document.querySelectorAll('.step').forEach((st,i)=>{st.classList.toggle('active',i+1===n);st.classList.toggle('done',i+1<n)});
  cur=n; window.scrollTo({top:0,behavior:'smooth'});
}

async function runOCR(){
  const f=fileInput.files[0]; if(!f){alert('Wybierz plik');return}
  const r=await Tesseract.recognize(f,'pol'); const t=r.data.text||'';
  ocrText.value=t; detectDocType(t); extractStudent(t); go(2);
}

function detectDocType(t){
  t=t.toLowerCase();
  DOC_TYPE=t.includes('orzeczenie o potrzebie')?'orzeczenie':'opinia';
  if(DOC_TYPE==='opinia'){st3.classList.add('disabled');st4.classList.add('disabled')}else{st3.classList.remove('disabled');st4.classList.remove('disabled')}
}

function extractStudent(t){
  const s=t.replace(/\n+/g,' ');
  const p=s.match(/\b\d{11}\b/); const n=s.match(/Imi[eę]\s+i\s+nazwisko[:\-]?\s*([A-ZĄĆĘŁŃÓŚŻŹ][^,]+)/);
  if(p) f_pesel.value=p[0]; if(n) f_name.value=n[1];
}
</script>
</body>
</html>
